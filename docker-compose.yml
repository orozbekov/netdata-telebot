services:
  telebot:
    build: .
    container_name: netdata-telebot
    restart: always
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
    
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"