services:
  telebot:
    build: .
    container_name: netdata-telebot
    restart: always
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
    
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python bot.py' || exit 1"]
      interval: 40s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"