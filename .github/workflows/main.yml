name: CI/CD for Netdata Bot

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: "123456789:FAKE_TOKEN_FOR_TESTS"
          LOG_LEVEL: "DEBUG"
        run: pytest tests/ -v

  deploy:
    name: Deploy to Server
    runs-on: [self-hosted, netdata-runner]
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from Secrets
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
          echo "LOG_LEVEL=${{ secrets.LOG_LEVEL || 'INFO' }}" >> .env

      - name: Build and Run Container
        run: |
          docker compose down --remove-orphans
          docker compose up -d --build
          docker system prune -f
          
          echo "✅ Бот успешно запущен и работает в фоне"
      
  notify:
    name: Final Notification
    runs-on: ubuntu-latest
    needs: [lint-and-test, deploy]
    if: always() 
    steps:
      - name: Send Telegram Status
        run: |
          # Определяем статус: если кто-то из предшественников упал — значит FAILURE
          if [[ "${{ needs.lint-and-test.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="✅ *Deploy Successful*"
            DETAILS="Бот обновлен и запущен на сервере."
          else
            STATUS="❌ *Pipeline Failed!*"
            DETAILS="Ошибка произошла на этапе: 
            - Tests: ${{ needs.lint-and-test.result }}
            - Deploy: ${{ needs.deploy.result }}"
          fi

          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${STATUS}%0A%0A${DETAILS}%0A%0A🔗 [View logs on GitHub](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
          -d "parse_mode=Markdown"