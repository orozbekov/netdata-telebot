name: CI/CD for Netdata Bot (Ansible Edition)

on:
  push:
    branches: [ main, master ]

jobs:
  # 1. Сначала проверяем код
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: "123456789:FAKE_TOKEN_FOR_TESTS"
        run: pytest tests/ -v

      - name: Notification on Failure
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=⚠️ *Lint/Test Failed!* %0A❌ Project: ${{ github.repository }}" \
          -d "parse_mode=Markdown"

  # 2. Если тесты прошли — деплоим через Ansible
  deploy:
    name: Deploy to Server via Ansible
    runs-on: [self-hosted, netdata-runner] 
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
      - name: Install Ansible collections
        run: ansible-galaxy collection install community.docker

      - name: Run Ansible Playbook
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }} # Важно: используй имя секрета как в GitHub
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i "${{ secrets.SERVER_IP }}," \
          -u devops \
          --private-key ~/.ssh/id_rsa \
          ansible/deploy.yml

      - name: Notification on Success
        if: success()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 *Deploy Successful (Ansible)* %0A✅ Project: ${{ github.repository }}" \
          -d "parse_mode=Markdown"